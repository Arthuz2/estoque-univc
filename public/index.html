<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockFlow — Produtos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="../public/assets/styles/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-brand">
      <i class="ti ti-box"></i>
      <span class="white">StockFlow</span>
    </div>
    <div class="navbar-links">
      <a href="#" class="active"><i class="ti ti-package"></i> Produtos</a>
    </div>
  </nav>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="container-fluid px-4 py-4">

    <!-- CABEÇALHO DA PÁGINA -->
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="page-title">Produtos</h4>
        <p class="page-sub">Lista de todos os produtos cadastrados no estoque</p>
      </div>
      <button class="btn-primary-sf" onclick="abrirModalNovo()">
        <i class="ti ti-plus"></i> Novo Produto
      </button>
    </div>

    <!-- BARRA DE BUSCA -->
    <div class="search-bar mb-3">
      <i class="ti ti-search search-icon"></i>
      <input
        type="text"
        id="campoBusca"
        class="form-control search-input"
        placeholder="Buscar produto por nome ou categoria..."
        oninput="filtrarProdutos()"
      />
    </div>

    <!-- TABELA DE PRODUTOS -->
    <div class="table-card">
      <table class="table table-produtos" id="tabelaProdutos">
        <thead>
          <tr>
            <th>#</th>
            <th>Produto</th>
            <th>Categoria</th>
            <th>Quantidade</th>
            <th>Valor Unitário</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="corpoTabela">
          <!-- Linhas geradas pelo JS -->
        </tbody>
      </table>

      <div id="semResultados" class="sem-resultados d-none">
        <i class="ti ti-search-off"></i>
        <p>Nenhum produto encontrado.</p>
      </div>
    </div>

  </main>

  <!-- MODAL EDITAR / NOVO PRODUTO -->
  <div class="modal-overlay" id="modalOverlay" onclick="fecharModal(event)">
    <div class="modal-box">
      <div class="modal-header-sf">
        <h5 id="modalTitulo">Editar Produto</h5>
        <button class="modal-close" onclick="fecharModalDireto()"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body-sf">
        <input type="hidden" id="modalId" />

        <div class="campo-grupo">
          <label for="modalNome">Nome do Produto</label>
          <input type="text" id="modalNome" class="form-control" placeholder="Ex: Caneta Azul BIC" />
        </div>

        <div class="campo-grupo">
          <label for="modalCategoria">Categoria</label>
          <input type="text" id="modalCategoria" class="form-control" placeholder="Ex: Papelaria" />
        </div>

        <div class="row g-3">
          <div class="col-6">
            <div class="campo-grupo">
              <label for="modalQtd">Quantidade em Estoque</label>
              <input type="number" id="modalQtd" class="form-control" placeholder="0" min="0" />
            </div>
          </div>
          <div class="col-6">
            <div class="campo-grupo">
              <label for="modalValor">Valor Unitário (R$)</label>
              <input type="number" id="modalValor" class="form-control" placeholder="0,00" min="0" step="0.01" />
            </div>
          </div>
        </div>

      </div>
      <div class="modal-footer-sf">
        <button class="btn-cancelar" onclick="fecharModalDireto()">Cancelar</button>
        <button class="btn-primary-sf" onclick="salvarProduto()">
          <i class="ti ti-device-floppy"></i> Salvar
        </button>
      </div>
    </div>
  </div>

  <!-- TOAST DE FEEDBACK -->
  <div class="toast-msg" id="toastMsg"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="../public/assets/js/api.js"></script>
<script src="../public/assets/js/produtos.js"></script>
<script src="../public/assets/js/movimentacao.js"></script>
<script src="../public/assets/js/app.js"></script>
</body>
</html>
