databases:
  - name: estoque-db
    plan: free
    databaseName: estoque
    user: estoque

services:
  - type: web
    name: estoque-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/produtos/
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: DATABASE_URL
        fromDatabase:
          name: estoque-db
          property: connectionString
